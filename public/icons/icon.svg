  <line x1="128" y1="222" x2="228" y2="223" stroke="#e2e8f0" stroke-width="10" stroke-linecap="round"/>
  <line x1="128" y1="249" x2="228" y2="250" stroke="#e2e8f0" stroke-width="10" stroke-linecap="round"/>
  <line x1="128" y1="276" x2="228" y2="277" stroke="#e2e8f0" stroke-width="10" stroke-linecap="round"/>
  <line x1="128" y1="303" x2="190" y2="304" stroke="#e2e8f0" stroke-width="10" stroke-linecap="round"/>

  <!-- Lines on right page -->
  <line x1="284" y1="195" x2="384" y2="196" stroke="#cbd5e1" stroke-width="10" stroke-linecap="round"/>
  <line x1="284" y1="222" x2="384" y2="223" stroke="#cbd5e1" stroke-width="10" stroke-linecap="round"/>
