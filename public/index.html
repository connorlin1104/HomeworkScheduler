<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyFlow — Homework Scheduler</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ================================================================
       HEADER
       ================================================================ -->
  <header class="site-header">
    <h1 class="logo">StudyFlow</h1>
    <div class="header-actions">
      <label class="toggle-completed">
        <input type="checkbox" id="show-completed-toggle">
        <span>Show completed</span>
      </label>
      <button class="btn btn-primary" id="add-hw-btn">+ Add Homework</button>
      <div class="undo-redo-group">
        <button class="btn btn-icon-header" id="undo-btn" title="Undo (Ctrl+Z)" aria-label="Undo" disabled>↩</button>
        <button class="btn btn-icon-header" id="redo-btn" title="Redo (Ctrl+Y)" aria-label="Redo" disabled>↪</button>
      </div>
      <button class="btn btn-icon btn-icon--lg" id="settings-btn" title="Class Settings" aria-label="Class Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M19.14,12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94L14.4,2.81c-.04-.24-.24-.41-.48-.41h-3.84c-.24,0-.43.17-.47.41L9.25,5.35c-.59.24-1.13.56-1.62.94L5.24,5.33c-.22-.08-.47,0-.59.22L2.74,8.87c-.12.21-.08.47.12.61l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s.02.64.07.94L2.84,14.52c-.18.14-.23.41-.12.61l1.92,3.32c.12.22.37.29.59.22l2.39-.96c.5.38,1.03.7,1.62.94l.36,2.54c.05.24.24.41.48.41h3.84c.24,0,.44-.17.47-.41l.36-2.54c.59-.24,1.13-.56,1.62-.94l2.39.96c.22.08.47,0,.59-.22l1.92-3.32c.12-.22.07-.47-.12-.61L19.14,12.94zM12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6,3.6,1.62,3.6,3.6-1.62,3.6-3.6,3.6z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ================================================================
       MAIN CONTENT
       ================================================================ -->
  <main class="main-content">
    <div id="classes-container"></div>

    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon">&#x1F4DA;</div>
      <h2>No classes yet</h2>
      <p>Click the gear icon to add your classes and get started.</p>
      <button class="btn btn-primary" id="empty-settings-btn">Set Up Classes</button>
    </div>
  </main>

  <!-- ================================================================
       ADD HOMEWORK MODAL
       ================================================================ -->
  <div id="hw-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="hw-modal-title">
    <div class="modal-backdrop" id="hw-backdrop"></div>
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="hw-modal-title">New Assignment</h2>
        <button class="close-btn" id="close-hw-modal" aria-label="Close">&times;</button>
      </div>
      <form id="hw-form" novalidate>
        <div class="form-group">
          <label for="hw-class">Class <span class="required">*</span></label>
          <select id="hw-class" required></select>
        </div>
        <div class="form-group">
          <label for="hw-desc">Description <span class="required">*</span></label>
          <input type="text" id="hw-desc" placeholder="e.g. Chapter 5 problems, p. 42-50" required autocomplete="off">
        </div>
        <div class="form-group">
          <label for="hw-notes">Notes <span class="optional">(optional)</span></label>
          <textarea id="hw-notes" placeholder="Any extra details, resources, etc."></textarea>
        </div>
        <div class="form-group">
          <label for="hw-deadline">Deadline <span class="optional">(optional)</span></label>
          <input type="date" id="hw-deadline">
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancel-hw">Cancel</button>
          <button type="submit" class="btn btn-primary">Add to Schedule</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ================================================================
       SETTINGS MODAL
       ================================================================ -->
  <div id="settings-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div class="modal-backdrop" id="settings-backdrop"></div>
    <div class="modal-box modal-box--wide">
      <div class="modal-header">
        <h2 id="settings-title">Class Settings</h2>
        <button class="close-btn" id="close-settings" aria-label="Close">&times;</button>
      </div>

      <div class="settings-section">
        <h3 class="settings-section-label">Your Classes</h3>
        <div id="settings-classes-list"></div>
      </div>

      <hr class="divider">

      <div class="settings-section">
        <h3 class="settings-section-label" id="class-form-title">Add New Class</h3>
        <form id="class-form" novalidate>
          <input type="hidden" id="edit-class-id">

          <div class="form-row">
            <div class="form-group form-group--grow">
              <label for="class-name">Class Name <span class="required">*</span></label>
              <input type="text" id="class-name" placeholder="e.g. Mathematics" required autocomplete="off">
            </div>
            <div class="form-group">
              <label>Color</label>
              <div class="color-picker">
                <div class="color-swatches" id="color-swatches"></div>
                <input type="color" id="class-color" value="#3b82f6" title="Custom color">
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="class-teacher">Teacher</label>
              <input type="text" id="class-teacher" placeholder="e.g. Mr. Smith" autocomplete="off">
            </div>
            <div class="form-group">
              <label for="class-room">Room</label>
              <input type="text" id="class-room" placeholder="e.g. Room 101" autocomplete="off">
            </div>
            <div class="form-group">
              <label for="class-period">Period</label>
              <input type="text" id="class-period" placeholder="e.g. 1st Period" autocomplete="off">
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary hidden" id="cancel-edit-class">Cancel Edit</button>
            <button type="submit" class="btn btn-primary" id="class-form-submit">Add Class</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
